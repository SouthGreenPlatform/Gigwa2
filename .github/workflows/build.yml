name: Gigwa Build RELEASE-TEST

on:
  push:
    branches:
      - feat/update-actions

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        asset:
          - { path: 'target/Gigwa_V2.9-RELEASE-TEST_Webapp.zip', name: 'Gigwa_V2.9-RELEASE-TEST_Webapp.zip', type: 'application/zip' }
          - { path: 'misc/macos_bundle.command', name: 'Gigwa_V2.9-RELEASE-TEST_bundle_creation_osx.command', type: 'application/x-sh' }
          - { path: 'misc/linux_bundle.sh', name: 'Gigwa_V2.9-RELEASE-TEST_bundle_creation_ubuntu.sh', type: 'application/x-sh' }
          - { path: 'misc/win_bundle.ps1', name: 'Gigwa_V2.9-RELEASE-TEST_bundle_creation_windows.ps1', type: 'application/powershell' }
          - { path: 'docker-compose.yml', name: 'Gigwa_V2.9-RELEASE-TEST_docker-compose.yml', type: 'application/yml' }
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gitpython

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Run Python build script
        run: |
          cd misc
          python3 build.py

      - name: Check if target zip file exists
        run: |
          ls -l target/
          if [ -f target/Gigwa_V2.9-RELEASE-TEST_Webapp.zip ]; then
            echo "File exists."
          else
            echo "File does not exist."
            exit 1

      - name: Grep release version
        id: grep_release_version
        run: |
          echo "release_version=$(grep -m 1 project\\\.version pom.xml | sed -n 's/.*<project\.version>\(.*\)<\/project\.version>.*/\1/p')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1.1.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "${{ steps.grep_release_version.outputs.release_version }}"
          release_name: "${{ steps.grep_release_version.outputs.release_version }}"
          body: |
            For initial setups not using Docker, download the bundle creation script corresponding to your OS, place it in the desired installation location, and launch it!
          draft: false
          prerelease: false

      - name: Verify and list target directory contents before upload
        run: |
          ls -l target/
          if [ -f target/Gigwa_V2.9-RELEASE-TEST_Webapp.zip ]; then
            echo "File exists before upload."
          else:
            echo "File does not exist before upload."
            exit 1

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ matrix.asset.path }}
          asset_name: ${{ matrix.asset.name }}
          asset_content_type: ${{ matrix.asset.type }}
